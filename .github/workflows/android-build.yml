name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace > build_log.txt 2>&1 || (cat build_log.txt && exit 1)

      - name: Commit and Push APK back to repo
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk public/FinAura.apk
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/FinAura.apk
          git diff-index --quiet HEAD || git commit -m "[skip ci] Commit compiled APK to public folder"
          git push origin main

      - name: Upload Gradle Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: android/build_log.txt

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FinAura-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
