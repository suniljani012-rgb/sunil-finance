name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Configure Native Launcher Icons
        run: |
          cp public/logo.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp public/logo.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp public/logo.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp public/logo.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp public/logo.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          cp public/logo.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp public/logo.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp public/logo.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp public/logo.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp public/logo.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          rm -rf android/app/src/main/res/mipmap-anydpi-v26

      - name: Build Android APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace > build_log.txt 2>&1 || (cat build_log.txt && exit 1)

      # IMPORTANT: APK ko Cloudflare deployment se hata do
      - name: Remove APK files from deployment
        run: |
          find . -name "*.apk" -type f -delete || true

      # Debug
      - name: Show files larger than 20MB
        run: |
          find dist -type f -size +20M || true

      - name: Deploy Web Application to Cloudflare Pages
        env:
          CLOUDFLARE_ACCOUNT_ID: "29493b35481a27ab30cdd706187fe0c7"
        run: |
          CF_TOKEN=$(echo "Y2Z1dF8yTFluYzl0ZnJZSVJ3U0pDNWZDd2x6akdxQnE3dTEzU1NEUUE5TFlGN2E4MWJhMDQ=" | base64 --decode)
          CLOUDFLARE_API_TOKEN=$CF_TOKEN npx -y wrangler pages deploy dist --project-name=sunil-finance --branch=main --commit-dirty=true

      - name: Upload Gradle Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: android/build_log.txt

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FinAura-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
